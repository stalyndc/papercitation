<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paper Citation — Find Academic Sources for Your Claims</title>
    <meta
      name="description"
      content="Enter a claim and instantly find academic papers with ready-to-copy citations in APA, MLA, Chicago, and Harvard formats."
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://papercitation.com/" />

    <!-- Open Graph tags -->
    <meta property="og:title" content="Paper Citation — Find Academic Sources for Your Claims" />
    <meta property="og:description" content="Enter a claim and instantly find academic papers with ready-to-copy citations in APA, MLA, Chicago, and Harvard formats." />
    <meta property="og:url" content="https://papercitation.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://papercitation.com/favicon.svg" />

    <!-- Twitter Card tags -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Paper Citation — Find Academic Sources for Your Claims" />
    <meta name="twitter:description" content="Enter a claim and instantly find academic papers with ready-to-copy citations in APA, MLA, Chicago, and Harvard formats." />
    <meta name="twitter:image" content="https://papercitation.com/favicon.svg" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page-container">
      <header class="site-header">
        <a href="index.html" class="title-container">
          <svg class="title-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#FF6D1F;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#d45a19;stop-opacity:1" />
              </linearGradient>
            </defs>
            <path d="M9 4.5C9 3.67 9.67 3 10.5 3h8C19.33 3 20 3.67 20 4.5v15c0 .83-.67 1.5-1.5 1.5h-8c-.83 0-1.5-.67-1.5-1.5v-15z" stroke="url(#iconGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M6 8.5C6 7.67 6.67 7 7.5 7H9v10H7.5C6.67 17 6 16.33 6 15.5v-7z" stroke="url(#iconGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 12.5C3 11.67 3.67 11 4.5 11H6v2H4.5C3.67 13 3 12.33 3 11.5v-1z" stroke="url(#iconGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M13 8h4M13 12h4M13 16h4" stroke="url(#iconGradient)" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <h1>Paper Citation</h1>
        </a>
        <nav class="header-nav">
          <a href="login.html" class="sign-in-link">Sign in</a>
        </nav>
      </header>

      <div class="container">
        <header class="page-header">
          <p class="tagline">
            Find academic sources for any claim. Instant citations.
          </p>
        </header>

      <main>
        <form id="search-form">
          <label for="claim-input">What claim do you need a source for?</label>
          <textarea
            id="claim-input"
            placeholder="e.g., Social media usage correlates with increased anxiety in teenagers"
            rows="3"
            required
          ></textarea>
          <button type="submit" id="search-btn">
            <span class="btn-text">Find Sources</span>
            <span class="btn-loading" hidden>Searching...</span>
          </button>
        </form>

        <div id="results-section" hidden>
          <div class="results-header">
            <h2>Sources Found</h2>
            <p class="search-terms">
              Search terms: <span id="terms-used"></span>
            </p>
          </div>
          <div id="results-list"></div>
        </div>

        <div id="error-message" hidden></div>
        <div id="empty-state" hidden>
          <p>
            No academic sources found for this claim. Try rephrasing or being
            more specific.
          </p>
        </div>
      </main>

      <footer>
        <div class="footer-nav">
          <a href="about.html">About</a> · <a href="contact.html">Contact</a> · <a href="privacy.html">Privacy</a> · <a href="terms.html">Terms</a>
        </div>
        <p>
          Sources from
          <a href="https://openalex.org" target="_blank" rel="noopener"
            >OpenAlex</a
          >. Always verify citations before submitting.
        </p>
      </footer>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
